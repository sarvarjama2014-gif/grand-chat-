services:
  - type: web
    name: grand-chat
    env: node
    region: frankfurt
    buildCommand: cd backend && npm install
    startCommand: cd backend && node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGINS
        value: https://grand-chat.onrender.com,http://localhost:5001
      - key: DB_PATH
        value: /var/data/grand-chat.db
    disk:
      name: data
      mountPath: /var/data
      sizeGB: 1
